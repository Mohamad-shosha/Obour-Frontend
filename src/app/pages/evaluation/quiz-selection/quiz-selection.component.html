<div class="quiz-selection-page min-vh-100 bg-light" dir="rtl">
  <div class="container px-4 py-5">

    <!-- Back Button -->
    <div class="mb-4">
      <button class="btn-back d-inline-flex align-items-center gap-2" (click)="goBack()">
        <i class="fa-solid fa-arrow-right"></i>
        <span>العودة إلى الأقسام</span>
      </button>
    </div>

    <!-- Section Header -->
    <div class="text-center mb-5 animate-slide-up" *ngIf="parentSection">
      <div class="section-icon-large mx-auto mb-4"
           [ngClass]="parentSection.type === 'academic' ? 'bg-primary' : 'bg-success'">
        <i [class]="getIconClass(parentSection.type)" class="text-white fs-2"></i>
      </div>
      <h1 class="display-5 fw-bold text-dark mb-2">{{ parentSection.name }}</h1>
      <p class="text-muted fs-5">اختر الاختبار الذي تريد البدء به</p>
    </div>

    <!-- Loading State -->
    <div *ngIf="loading" class="row g-4 justify-content-center">
      <div class="col-sm-10 col-md-6 col-lg-4" *ngFor="let i of [0,1,2]">
        <div class="bg-white rounded-4 p-4 border">
          <div class="skeleton mb-3" style="height: 20px; width: 70%;"></div>
          <div class="skeleton mb-2" style="height: 14px;"></div>
          <div class="skeleton mb-4" style="height: 14px; width: 80%;"></div>
          <div class="skeleton" style="height: 44px; border-radius: 50px;"></div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div *ngIf="error" class="alert alert-danger text-center rounded-3 animate-fade-in" role="alert">
      <i class="fa-solid fa-circle-exclamation me-2"></i>
      {{ error }}
    </div>

    <!-- Sub-sections Grid -->
    <div *ngIf="!loading && !error">
      <div class="row justify-content-center g-4">
        <div *ngFor="let section of subSections; let i = index"
             class="col-sm-10 col-md-6 col-lg-4"
             (click)="startQuiz(section.id)"
             style="cursor: pointer">
          <div class="quiz-card h-100 rounded-4 bg-white border overflow-hidden"
               [ngClass]="section.type === 'academic' ? 'quiz-card--academic' : 'quiz-card--psych'">
            <div class="quiz-card-accent"></div>
            <div class="p-4 d-flex flex-column h-100">
              <div class="quiz-number mb-3">{{ i + 1 }}</div>
              <h3 class="fs-5 fw-bold text-dark mb-3">{{ section.name }}</h3>
              <p class="text-muted small mb-4 flex-grow-1">
                {{ section.type === 'academic' ? 'تقييم أكاديمي وتقني متعمق' : 'تحليل نفسي وسلوكي شامل' }}
              </p>
              <button class="btn w-100 py-2 rounded-pill fw-semibold"
                      [ngClass]="getButtonClass(section.type)">
                ابدأ الاختبار
              </button>
            </div>
          </div>
        </div>

        <!-- Empty State -->
        <div *ngIf="subSections.length === 0" class="col-12 text-center py-5">
          <div class="empty-icon mx-auto mb-4">
            <i class="fa-solid fa-clipboard-question text-muted fs-2"></i>
          </div>
          <h3 class="h5 fw-bold text-dark mb-2">لا توجد اختبارات</h3>
          <p class="text-muted">لا توجد اختبارات متاحة لهذا القسم حاليًا.</p>
        </div>
      </div>
    </div>
  </div>
</div>
