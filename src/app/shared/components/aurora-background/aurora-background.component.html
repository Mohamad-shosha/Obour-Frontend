<div class="aurora-container">
  <!-- Layer 1: Aurora Mesh -->
  <div class="aurora-mesh" #auroraMesh></div>
  
  <!-- Layer 2: Soft Particles -->
  <div class="aurora-particles" #particles>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
  </div>
  
  <!-- Layer 3: 3D Orb -->
  <div class="aurora-orb" #auroraOrb></div>
  
  <!-- Layer 4: Glass Surface Overlay (subtle) -->
  <div class="aurora-glass-overlay"></div>
  
  <!-- Layer 5: Content Projection -->
  <div class="aurora-content">
    <ng-content></ng-content>
  </div>
</div>
