<header class="main-header sticky-top animate-header pt-3 pb-2">
  <div class="container">
    <div class="floating-header-inner px-3 px-md-4 py-2 d-flex align-items-center justify-content-between">
      
      <!-- Logo (يسار) -->
      <div class="d-flex align-items-center gap-2 gap-md-3 logo-area" (click)="onNavigate('home')" role="button" aria-label="الصفحة الرئيسية">
        <div class="logo-circle">
          <i class="fa-solid fa-graduation-cap text-white fs-6 fs-md-5"></i>
        </div>
        <div class="d-flex align-items-center gap-2">
          <h1 class="h5 fw-bold mb-0" style="color: var(--obour-primary);">عبور</h1>
          <span class="d-none d-xl-block" style="color: var(--obour-text-secondary); font-size: 0.85rem; padding-right: 5px; border-right: 1px solid var(--obour-border);">
            منصة تقييم الجاهزية للتدريب الميداني
          </span>
        </div>
      </div>

    <!-- Navigation (المنتصف - يظهر فقط على الشاشات المتوسطة فأعلى) -->
    <nav class="d-none d-md-flex align-items-center justify-content-center flex-grow-1 fade-in">
      <div class="d-flex gap-3">
        <button *ngFor="let item of menuItems" (click)="onNavigate(item.id)" class="header-link"
          [class.active]="currentPage === item.id">
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </button>
      </div>
    </nav>

    <!-- User Area or Guest Buttons -->
    <div class="d-none d-md-flex align-items-center gap-3 fade-in">
      <!-- Theme Toggle -->
      <button class="theme-toggle-btn" (click)="toggleTheme()"
        [attr.aria-label]="(isDark$ | async) ? 'تبديل إلى الوضع الفاتح' : 'تبديل إلى الوضع المظلم'"
        [title]="(isDark$ | async) ? 'الوضع الفاتح' : 'الوضع المظلم'">
        <i class="fa-solid" [class.fa-sun]="isDark$ | async" [class.fa-moon]="!(isDark$ | async)"></i>
      </button>
      <div class="vr"></div>
      <ng-container *ngIf="user; else guestButtons">
        <div class="text-end">
          <div class="fw-semibold">{{ user.name }}</div>
          <small class="text-muted">
            {{ user.role === "TEACHER" ? "معلم" : "طالب" }}
          </small>
        </div>
        <button (click)="onLogout()" class="logout-btn">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>تسجيل الخروج</span>
        </button>
      </ng-container>

      <ng-template #guestButtons>
        <button type="button" (click)="onNavigate('auth', 'login')" class="btn-ghost d-flex align-items-center gap-2">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span>دخول</span>
        </button>
        <button type="button" (click)="onNavigate('auth', 'register')" class="btn-premium d-flex align-items-center gap-2 px-3 py-2" style="font-size: 0.9rem;">
          <i class="fa-solid fa-user-plus"></i>
          <span>حساب جديد</span>
        </button>
      </ng-template>
    </div>

    <!-- Mobile menu toggle -->
    <button class="btn d-md-none" style="color: var(--obour-text-main);" (click)="isMenuOpen = !isMenuOpen">
      <i class="fa-solid" [class.fa-bars]="!isMenuOpen" [class.fa-xmark]="isMenuOpen"></i>
    </button>
    
    </div> <!-- end floating-header-inner -->
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isMenuOpen" class="mobile-menu mt-3 p-3 border-top slide-down">
    <button *ngFor="let item of menuItems" (click)="onNavigate(item.id); isMenuOpen = false" class="mobile-link"
      [class.active]="currentPage === item.id">
      <i [class]="item.icon"></i> {{ item.label }}
    </button>

    <!-- Theme Toggle (Mobile) -->
    <button class="mobile-link theme-toggle-mobile" (click)="toggleTheme()">
      <i class="fa-solid" [class.fa-sun]="isDark$ | async" [class.fa-moon]="!(isDark$ | async)"></i>
      {{ (isDark$ | async) ? 'الوضع الفاتح' : 'الوضع المظلم' }}
    </button>

    <hr />

    <ng-container *ngIf="user; else mobileGuest">
      <div class="text-end mb-3 fade-in">
        <div class="fw-semibold">{{ user.name }}</div>
        <small class="text-muted">
          {{ user.role === "TEACHER" ? "معلم" : "طالب" }}
        </small>
      </div>
      <button (click)="onLogout(); isMenuOpen = false" class="logout-btn w-100">
        <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
      </button>
    </ng-container>

    <ng-template #mobileGuest>
      <button (click)="onNavigate('auth', 'login'); isMenuOpen = false" class="login-btn w-100 mb-2">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> تسجيل الدخول
      </button>
      <button (click)="onNavigate('auth', 'register'); isMenuOpen = false" class="register-btn w-100">
        <i class="fa-solid fa-user-plus"></i> إنشاء حساب
      </button>
    </ng-template>
  </div>
</header>
