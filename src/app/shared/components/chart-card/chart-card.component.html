<!-- src/app/shared/components/chart-card/chart-card.component.html -->
<div
  class="rounded-3 p-3.5 card-shadow card-hover animate-slide-up h-100" style="background: var(--obour-surface);"
>
  <div class="d-flex align-items-center gap-3 mb-4">
    <div
      class="rounded-2 gradient-primary d-flex align-items-center justify-content-center"
      style="width: 36px; height: 36px"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        width="18"
        height="18"
        class="text-white"
      >
        <path [attr.d]="iconPath"></path>
      </svg>
    </div>
    <h3 class="h6 fw-bold mb-0" style="color: var(--obour-text-primary);">{{ title }}</h3>
  </div>
  <ng-content></ng-content>
  <!-- سيحتوي على المحتوى الداخلي -->
</div>
